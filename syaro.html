<style>
:root {
  --bg: #0b0e14;
  --card: #151a22;
  --card-header: #1e2530;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --ok: #10b981;
  --ng: #ef4444;
  --txt: #f3f4f6;
  --sub: #9ca3af;
  --border: #2d3748;
}
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
}
body {
  margin: 0;
  background-color: var(--bg);
  color: var(--txt);
  padding-bottom: 90px;
  font-size: 15px;
  line-height: 1.6;
}
header {
  position: sticky;
  top: 0;
  background-color: var(--card);
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  z-index: 100;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}
h1 {
  font-size: 16px;
  margin: 0;
  font-weight: 700;
  text-align: center;
  letter-spacing: 0.05em;
}
.stats {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  font-size: 11px;
  color: var(--sub);
  justify-content: center;
  flex-wrap: wrap;
}
.stats span {
  background: #222c3a;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.stats b {
  color: #fff;
}
.wrap {
  padding: 14px;
  max-width: 680px;
  margin: 0 auto;
}
.card {
  background: var(--card);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 14px;
  border: 1px solid var(--border);
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
}
.q-cat {
  font-size: 12px;
  background-color: rgba(59, 130, 246, 0.15);
  color: #60a5fa;
  font-weight: bold;
  padding: 4px 8px;
  border-radius: 4px;
  display: inline-block;
  margin-bottom: 12px;
  border: 1px solid rgba(59, 130, 246, 0.3);
}
.q-text {
  font-size: 14.5px;
  line-height: 2.2;
  margin-bottom: 16px;
  white-space: pre-wrap;
  color: var(--txt);
  background: #0f131a;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #1f2937;
}
.blank {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 48px;
  height: 28px;
  margin: 0 4px;
  text-align: center;
  border-bottom: 3px solid var(--accent);
  color: var(--accent);
  font-weight: bold;
  padding: 0 8px;
  cursor: pointer;
  background: rgba(59, 130, 246, 0.08);
  border-radius: 4px 4px 0 0;
  transition: all 0.2s ease;
  vertical-align: middle;
}
.blank:hover {
  background: rgba(59, 130, 246, 0.2);
}
.blank.cur {
  background: rgba(59, 130, 246, 0.3);
  border-bottom: 3px solid #60a5fa;
  box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
  transform: translateY(-1px);
}
.blank.filled {
  color: #ffffff;
  background: #1e2530;
  border-bottom-color: #4b5563;
}
.blank.ok {
  color: #fff;
  background-color: rgba(16, 185, 129, 0.2);
  border-bottom-color: var(--ok);
}
.blank.ng {
  color: #fff;
  background-color: rgba(239, 68, 68, 0.2);
  border-bottom-color: var(--ng);
}
.label {
  font-weight: bold;
  color: #93c5fd;
  margin: 14px 0 8px;
  font-size: 13px;
  display: flex;
  align-items: center;
}
.label::before {
  content: "📍";
  margin-right: 6px;
}
.choices {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
@media (max-width: 480px) {
  .choices {
    grid-template-columns: 1fr;
  }
}
.choice {
  background: #1e2530;
  color: var(--txt);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.4;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s ease;
}
.choice:hover {
  background: #262e3d;
  border-color: #4b5563;
}
.choice.sel {
  border-color: var(--accent);
  background: rgba(59, 130, 246, 0.2);
  color: #93c5fd;
  box-shadow: 0 0 8px rgba(59, 130, 246, 0.25);
}
.btn {
  display: block;
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 14px;
  font-size: 15px;
  font-weight: bold;
  margin-top: 14px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover {
  background: var(--accent-hover);
}
.btn.sub {
  background: #2a3441;
  color: var(--txt);
  border: 1px solid var(--border);
}
.btn.sub:hover {
  background: #344152;
}
.row2 {
  display: flex;
  gap: 10px;
}
.btn.half {
  flex: 1;
}
.exp {
  display: none;
  background: #0f131a;
  border-left: 4px solid var(--accent);
  padding: 14px;
  border-radius: 8px;
  margin-top: 16px;
  font-size: 13.5px;
  line-height: 1.8;
  border: 1px solid var(--border);
  border-left-width: 4px;
}
.exp.show {
  display: block;
}
.exp .item {
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid #1f2937;
}
.exp .item:last-child {
  margin-bottom: 0;
  padding-bottom: 0;
  border-bottom: none;
}
.exp b {
  color: #93c5fd;
}
.exp .x {
  color: var(--ng);
  font-weight: bold;
  margin-right: 6px;
}
.exp .o {
  color: var(--ok);
  font-weight: bold;
  margin-right: 6px;
}
.nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card);
  display: flex;
  border-top: 1px solid var(--border);
  box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.25);
  z-index: 99;
}
.nav button {
  flex: 1;
  background: none;
  border: none;
  color: var(--sub);
  padding: 10px 0;
  font-size: 11px;
  cursor: pointer;
  transition: color 0.15s;
}
.nav button.active {
  color: var(--accent);
}
.nav button div {
  font-size: 18px;
  margin-bottom: 2px;
}
.page {
  display: none;
}
.page.active {
  display: block;
}
textarea {
  width: 100%;
  height: 120px;
  background: #0f131a;
  color: var(--txt);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  font-size: 12px;
  margin-bottom: 10px;
}
.wrongItem {
  font-size: 13.5px;
  padding: 12px;
  margin-bottom: 10px;
  background: #1a202c;
  border-radius: 8px;
  border: 1px solid var(--border);
  border-left: 4px solid var(--ng);
}
.wrongItem .h {
  color: #fca5a5;
  font-weight: bold;
  margin-bottom: 4px;
}
small {
  color: var(--sub);
}
.hint {
  font-size: 12px;
  color: var(--sub);
  margin-top: 6px;
  text-align: center;
  background-color: #141b24;
  padding: 6px;
  border-radius: 4px;
}
</style>

<script>
/* ===== 第57回 社会保険労務士試験 選択式 全8問・全選択肢・公式解答完全準拠データ ===== */
var SEED = [
  {
    cat: "労働基準法及び労働安全衛生法 〔問 1〕",
    text: "₁ 労働基準法第₁₁₄ 条は、 【A】 は、同法第₃₇ 条の規定に違反した使用者に対して、労働者の請求により、同条の規定により使用者が支払わなければならない金額についての未払金のほか、これと同一額の 【B】 の支払を命ずることができる旨規定している。\n\n₂ 「労働基準法₆₅ 条は、産前産後休業を定めているが、産前産後休業中の賃金については何らの定めを置いていないから、産前産後休業が有給であることまでも保障したものではないと解するのが相当である。〔…（略）…〕本件各回覧文書によって具体化された本件₉₀ ％条項は、労働基準法₆₅ 条で認められた産前産後休業を取る権利〔…（略）…〕に基づく不就労を含めて出勤率を算定するものであるが、上述のような労働基準法₆₅ 条〔…（略）…〕の趣旨に照らすと、これにより上記権利等の行使を抑制し、ひいては労働基準法等が 【C】 場合に限り、公序に反するものとして無効となると解するのが相当である」。\n\n₃ 事業者は、労働安全衛生法第₂₂ 条に基づき、健康障害を防止するため必要な措置を講じなければならないが、事業場における自主的な労働衛生管理活動の促進を図るためには、総括安全衛生管理者、産業医、衛生管理者、衛生推進者等の選任及び職務の励行、衛生委員会の設置及び運営等の労働衛生管理体制の確立を基本とした上で、作業環境管理、 【D】 及び健康管理並びに労働衛生教育の総合的な実施を図っていく必要がある。\n\n₄ 労働安全衛生法第₄₂ 条は、「特定機械等以外の機械等で、別表第₂ に掲げるものその他危険若しくは有害な作業を必要とするもの、危険において使用するもの又は危険若しくは健康障害を防止するため使用するもののうち、政令で定めるものは、厚生労働大臣が定める規格又は安全装置を具備しなければ、 【E】 、又は設置してはならない。」と定めている。",
    choices: [
      "① 慰謝料",
      "② 厚生労働大臣",
      "③ 裁判所",
      "④ 作業管理",
      "⑤ 使用者に労働者の仕事と生活の調和にも配慮することを規定している趣旨を実質的に失わせるものと認められる",
      "⑥ 上記権利等を保障した趣旨を実質的に失わせるものと認められる",
      "⑦ 譲渡し、貸与し",
      "⑧ 譲渡し、展示し",
      "⑨ 生産管理",
      "⑩ 遅延損害金",
      "⑪ 同法等に違反する行為に罰則を設けている意味を没却させる",
      "⑫ 都道府県労働局長",
      "⑬ 賠償金",
      "⑭ 販売し、賃貸し",
      "⑮ 販売し、販売のために展示し",
      "⑯ 付加金",
      "⑰ 有害物管理",
      "⑱ 労働基準監督署長",
      "⑲ 労働時間管理",
      "⑳ 労働条件は労働者と使用者が対等の立場において決定すべきものとしている意味を没却させる"
    ],
    answer: [2, 15, 5, 3, 6], // A:③, B:⑯, C:⑥, D:④, E:⑦
    exp: [
      "【A】= ③ 裁判所。労基法114条に基づく「付加金」の支払いを命ずることができる主体は裁判所です（行政官庁や労基署長等ではありません）。",
      "【B】= ⑯ 付加金。解雇予告手当、休業手当、割増賃金、有給休暇の賃金の未払に対し、これらと同一額の支払いを命じることができるのが「付加金」です。",
      "【C】= ⑥ 上記権利等を保障した趣旨を実質的に失わせるものと認められる。最高裁判所の判例（東朋学園事件）からの出題です。",
      "【D】= ④ 作業管理。労働安全衛生における3管理とは、「作業環境管理」「作業管理」「健康管理」です。空欄Dは作業管理が入ります。",
      "【E】= ⑦ 譲渡し、貸与し。労働安全衛生法第42条（譲渡等の制限）「…厚生労働大臣が定める規格又は安全装置を具備しなければ、譲渡し、貸与し、又は設置してはならない。」と定められています。"
    ]
  },
  {
    cat: "労働者災害補償保険法 〔問 2〕",
    text: "₁ 遺族補償年金を受けることができる、障害の状態にある遺族の障害の状態について、労災保険法施行規則第₁₅ 条は、「障害の状態は、身体に別表第₁ の障害等級の 【A】 に該当する障害がある状態又は負傷若しくは疾病が治らないで、身体の機能若しくは精神に、 【B】 が高度の制限を受けるか、若しくは 【B】 に高度の制限を加えることを必要とする程度以上の障害がある状態とする。」と定めている。\n\n₂ 労災保険法施行規則第₃₆ 条第₁ 項は、「長期家族介護者援護金は、別表第₁ の障害等級第₁ 級若しくは第₂ 級の障害補償年金、複数事業労働者障害年金若しくは障害年金又は別表第₂ の傷病等級第₁ 級若しくは第₂ 級の傷病補償年金、複数事業労働者傷病年金若しくは傷病年金を受けていた期間が 【C】 以上である者の遺族のうち、支援が必要な者として厚生労働省労働基準局長が定める要件を満たす者に対して、支給するものとする。」と規定している。\n\n₃ 最高裁判所は、労災就学援護費不支給決定が抗告訴訟の対象となるかが問題となった事件において、次のように判示した。\n「労災就学援護費に関する制度の仕組みにかんがみれば、〔労災保険〕法は、労働者が業務災害等を被った場合に、政府が、〔労災保険〕法第₃ 章の規定に基づいて行う保険給付を 【D】 するために、労働福祉事業〔現・社会復帰促進等事業〕として、保険給付と同様の手続により、被災労働者又はその遺族に対して労災就学援護費を支給することができる旨を規定しているものと解するのが相当である。そして、被災労働者又はその遺族は、上記のとおり、所定の支給要件を具備するときは所定額の労災就学援護費の支給を受けることができるという抽象的な地位を与えられているが、具体的に支給を受けるためには、 【E】 に申請し、所定の支給要件を具備していることの確認を受けなければならず、 【E】 の支給決定によって初めて具体的な労災就学援護費の支給請求権を取得するものといわなければならない。」",
    choices: [
      "① ₃ 年",
      "② ₅ 年",
      "③ ₇ 年",
      "④ ₁₀ 年",
      "⑤ 確保",
      "⑥ 厚生労働大臣",
      "⑦ 第₁ 級",
      "⑧ 第₅ 級以上",
      "⑨ 第₈ 級以上",
      "⑩ 第₁₂ 級以上",
      "⑪ 代替",
      "⑫ 都道府県労働局長",
      "⑬ 日常生活",
      "⑭ 日常生活又は社会生活",
      "⑮ 付加",
      "⑯ 補完",
      "⑰ 労働",
      "⑱ 労働基準監督署長",
      "⑲ 労働者災害補償保険審査官",
      "⑳ 労働又は社会生活"
    ],
    answer: [7, 16, 3, 15, 17], // A:⑧, B:⑰, C:④, D:⑯, E:⑱
    exp: [
      "【A】= ⑧ 第₅ 級以上。労災則15条に定める障害の状態の基準は、「身体に別表第1の障害等級の『第5級以上』に該当する障害がある状態」とされています。",
      "【B】= ⑰ 労働。同規則第15条の続きは、「…身体の機能若しくは精神に、『労働』が高度の制限を受けるか、若しくは『労働』に高度の制限を加えることを必要とする程度以上の…」となります。",
      "&emsp;（※ 【B】は同じ語句が入ります。選択肢⑰の「労働」が適用されます。）",
      "【C】= ④ ₁₀ 年。労災保険法施行規則第36条に定める長期家族介護者援護金の支給対象要件は、年金等を受けていた期間が「10年」以上です。",

/* ===== 起動時データ整合チェック ===== */
function blankCountOf(t){return (t.match(/【[A-E]】/g)||[]).length;}
function blankLabelsOf(t){var m=t.match(/【([A-E])】/g)||[];return m.map(function(x){return x.charAt(1);});}

/* ===== 保存データの管理 ===== */
function load(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}

var QS = load('s57_qs_v3', null);
if (!QS || QS.length === 0) {
  QS = JSON.parse(JSON.stringify(SEED));
  save('s57_qs_v3', QS);
}
var ST = load('s57_st_v3', {idx:0, okBlanks:0, wrong:[]});

var cur = ST.idx || 0;
if (cur >= QS.length) { cur = 0; ST.idx = 0; }

var picks = {};             // 現在選択中の値 {0: selectedIdx, 1: selectedIdx...}
var checked = false;        // すでに採点ボタンを押したか
var activeBlank = 0;        // 現在フォーカスされている空欄の順番 (0 = 最初の空欄)

/* ===== 画面更新ロジック ===== */
function renderHead() {
  document.getElementById('prog').textContent = cur + 1;
  document.getElementById('totalQ').textContent = QS.length;
  document.getElementById('cnt').textContent = QS.length;
  document.getElementById('okBlanks').textContent = ST.okBlanks;
  document.getElementById('ngCount').textContent = ST.wrong.length;
}

// 本文中の【A】～【E】を動的にspan要素（タップ可能な空欄）へ置換する
function buildText(text) {
  var labels = blankLabelsOf(text);
  var i = -1;
  return text.replace(/【([A-E])】/g, function(match, labelChar) {
    i++;
    var bi = i; // 登場順インデックス
    var content = "";
    if (picks[bi] != null) {
      content = "[" + labelChar + "] " + QS[cur].choices[picks[bi]];
    } else {
      content = "【" + labelChar + "】";
    }
    
    var cls = "blank";
    if (picks[bi] != null) cls += " filled";
    if (bi === activeBlank) cls += " cur";
    
    return '<span class="' + cls + '" id="bk' + bi + '" onclick="selBlank(' + bi + ')">' + content + '</span>';
  });
}

// ユーザーが本文のいずれかの空欄をタップした際のイベント
function selBlank(bi) {
  if (checked) return; // 採点後は選択不可
  activeBlank = bi;
  drawQ();
}

// 選択肢エリア(20択のボタン一覧)を描画する
function drawChoices() {
  var q = QS[cur];
  var labels = blankLabelsOf(q.text);
  var curLabel = labels[activeBlank] || "?";
  
  var html = '<div class="label">空欄【' + curLabel + '】に入る語句を、以下の20択から選択してください：</div>';
  html += '<div class="choices">';
  
  q.choices.forEach(function(choiceText, i) {
    var isSelected = (picks[activeBlank] === i) ? ' sel' : '';
    html += '<button class="choice' + isSelected + '" onclick="pick(' + i + ')">' + choiceText + '</button>';
  });
  html += '</div>';
  
  document.getElementById('choiceArea').innerHTML = html;
}

// 選択肢を1つ選んだ時
function pick(i) {
  if (checked) return;
  picks[activeBlank] = i;
  
  // 自動的に次の空欄へフォーカスを移動する
  var totalBlanks = blankCountOf(QS[cur].text);
  drawQ();
  
  // まだ埋まっていない空欄があればそこへ、なければ次の番号へ進める
  for (var b = 0; b < totalBlanks; b++) {
    if (picks[b] == null) {
      activeBlank = b;
      drawQ();
      return;
    }
  }
}

// 問題の再描画メイン処理
function drawQ() {
  var q = QS[cur];
  var totalBlanks = blankCountOf(q.text);
  
  var html = '<div class="q-cat">' + q.cat + '</div>';
  html += '<div class="q-text">' + buildText(q.text) + '</div>';
  html += '<div class="hint">☝️ 上の空欄【A】〜【E】をタップすると、その空欄に対応する20個の選択肢に切り替わります。</div>';
  html += '<div id="choiceArea"></div>';
  
  if (!checked) {
    html += '<button class="btn" onclick="checkAns()">すべての空欄を採点する</button>';
  }
  
  html += '<div class="exp" id="exp"></div>';
  
  html += '<div class="row2" style="margin-top:16px">' +
          '<button class="btn sub half" onclick="goQ(-1)">◀ 前の問題</button>' +
          '<button class="btn sub half" onclick="goQ(1)">次の問題 ▶</button>' +
          '</div>';
          
  document.getElementById('quizCard').innerHTML = html;
  drawChoices();
  
  if (checked) {
    showResult();
  }
  renderHead();
}

// 採点処理
function checkAns() {
  var q = QS[cur];
  var n = blankCountOf(q.text);
  var labels = blankLabelsOf(q.text);
  
  // 未回答チェック
  for (var b = 0; b < n; b++) {
    if (picks[b] == null) {
      alert('未入力の空欄があります。空欄【' + labels[b] + '】を選択してください。');
      activeBlank = b;
      drawQ();
      return;
    }
  }
  
  checked = true;
  var today = new Date().toLocaleDateString('ja-JP');
  
  for (var b = 0; b < n; b++) {
    var isCorrect = (picks[b] === q.answer[b]);
    if (isCorrect) {
      ST.okBlanks++;
    } else {
      // 誤答ログを保存
      ST.wrong.push({
        date: today,
        cat: q.cat,
        blank: labels[b],
        your: q.choices[picks[b]],
        correct: q.choices[q.answer[b]],
        exp: q.exp[b] || "解説はありません。"
      });
    }
  }
  save('s57_st_v3', ST);
  drawQ();
}

// 採点結果・解説の表示
function showResult() {
  var q = QS[cur];
  var n = blankCountOf(q.text);
  var labels = blankLabelsOf(q.text);
  
  for (var b = 0; b < n; b++) {
    var el = document.getElementById('bk' + b);
    if (el) {
      el.classList.remove('cur', 'filled');
      var isCorrect = (picks[b] === q.answer[b]);
      el.classList.add(isCorrect ? 'ok' : 'ng');
    }
  }
  
  var h = '<h3 style="margin-top:0; color:#fff; border-bottom:1px solid var(--border); padding-bottom:8px;">💡 採点結果と詳細解説</h3>';
  for (var b = 0; b < n; b++) {
    var isCorrect = (picks[b] === q.answer[b]);
    h += '<div class="item">';
    h += '<b>【' + labels[b] + '】</b> ';
    if (isCorrect) {
      h += '<span class="o">◯ 正解</span><br>';
    } else {
      h += '<span class="x">× 不正解</span><br>';
    }
    h += 'あなたの回答: <span style="color:#fca5a5">' + q.choices[picks[b]] + '</span><br>';
    if (!isCorrect) {
      h += '正しい解答: <span class="o" style="font-weight:bold">' + q.choices[q.answer[b]] + '</span><br>';
    }
    h += '<span style="color:#d1d5db; font-size:12.5px;">解説: ' + q.exp[b] + '</span>';
    h += '</div>';
  }
  
  var expDiv = document.getElementById('exp');
  expDiv.innerHTML = h;
  expDiv.classList.add('show');
}

// 問題の前後移動
function goQ(d) {
  cur += d;
  if (cur < 0) {
    alert("これが最初の問題です。");
    cur = 0;
    return;
  }
  if (cur >= QS.length) {
    alert("すべての問題を終了しました！最初に戻ります。");
    cur = 0;
  }
  
  ST.idx = cur;
  save('s57_st_v3', ST);
  
  // 各フラグ初期化
  picks = {};
  checked = false;
  activeBlank = 0;
  
  drawQ();
}

/* ===== 誤答履歴ページの描画 ===== */
function renderWrong() {
  var box = document.getElementById('wrongList');
  if (ST.wrong.length === 0) {
    box.innerHTML = '<p style="text-align:center; color:var(--sub);"><small>現在、間違えた問題はありません。素晴らしい！</small></p>';
    return;
  }
  
  box.innerHTML = ST.wrong.slice().reverse().map(function(w) {
    return '<div class="wrongItem">' +
           '<div class="h">' + w.cat + ' 空欄【' + w.blank + '】 <span style="font-size:10px; font-weight:normal; color:var(--sub); float:right;">' + w.date + '</span></div>' +
           '<div>あなたの誤答: <span style="color:var(--ng); text-decoration:line-through;">' + w.your + '</span></div>' +
           '<div>正しい解答: <span style="color:var(--ok); font-weight:bold;">' + w.correct + '</span></div>' +
           '<div style="margin-top:6px; font-size:12px; color:var(--sub); border-top:1px solid #2d3748; padding-top:4px;">' + w.exp + '</div>' +
           '</div>';
  }).join('');
}

function clearWrong() {
  if (confirm('蓄積されたすべての誤答記録をクリアしますか？')) {
    ST.wrong = [];
    save('s57_st_v3', ST);
    renderWrong();
    renderHead();
  }
}

/* ===== タブ切り替え制御 ===== */
function tab(name, btn) {
  var ps = document.querySelectorAll('.page');
  for (var i = 0; i < ps.length; i++) {
    ps[i].classList.remove('active');
  }
  document.getElementById('p-' + name).classList.add('active');
  
  var bs = document.querySelectorAll('.nav button');
  for (var j = 0; j < bs.length; j++) {
    bs[j].classList.remove('active');
  }
  if (btn) btn.classList.add('active');
  
  if (name === 'review') renderWrong();
  if (name === 'study') drawQ();
  if (name === 'add') {
    document.getElementById('cnt').textContent = QS.length;
  }
}

/* ===== 外部JSON追加・初期化制御 ===== */
function importJSON() {
  var t = document.getElementById('box').value.trim();
  if (!t) {
    alert('JSONデータをテキストエリアに貼り付けてください。');
    return;
  }
  try {
    var arr = JSON.parse(t);
    if (!Array.isArray(arr)) {
      arr = [arr];
    }
    
    var errorMsgs = [];
    arr.forEach(function(q, i) {
      if (!q.cat || !q.text || !q.choices || !q.answer || !q.exp) {
        errorMsgs.push("データ項目(cat, text, choices, answer, exp)が欠落しています。");
        return;
      }
      var blankNum = blankCountOf(q.text);
      if (q.answer.length !== blankNum || q.exp.length !== blankNum) {
        errorMsgs.push(q.cat + " の「空欄数(" + blankNum + ")」「正答値(answer)の要素数(" + q.answer.length + ")」「解説(exp)の要素数(" + q.exp.length + ")」が不一致です。");
      }
    });
    
    if (errorMsgs.length > 0) {
      alert("整合性エラーが発生したため、取り込みを中止しました：\n" + errorMsgs.join("\n"));
      return;
    }
    
    arr.forEach(function(q) {
      QS.push(q);
    });
    
    save('s57_qs_v3', QS);
    document.getElementById('box').value = "";
    alert(arr.length + "問を追加しました！（合計 " + QS.length + " 問になりました）");
    renderHead();
  } catch (e) {
    alert("JSONデータのパースに失敗しました。正しいJSON構文（括弧の閉じ等）かご確認ください：\n" + e.message);
  }
}

function exportJSON() {
  var dataStr = JSON.stringify(QS, null, 2);
  var blob = new Blob([dataStr], {type: 'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sharoshi_selected_questions_backup.json';
  a.click();
}

function resetSeed() {
  if (confirm('初期問題以外の追加データを削除し、第57回選択式試験（全8問）の初期状態に戻しますか？')) {
    QS = JSON.parse(JSON.stringify(SEED));
    save('s57_qs_v3', QS);
    cur = 0;
    ST.idx = 0;
    ST.okBlanks = 0;
    save('s57_st_v3', ST);
    picks = {};
    checked = false;
    activeBlank = 0;
    drawQ();
    alert('初期状態にリセットしました。');
  }
}

/* ===== アプリ起動処理 ===== */
(function() {
  drawQ();
  renderHead();
})();
</script>
