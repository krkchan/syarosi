
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>社労士 第57回 選択式 究極対策アプリ</title>
<style>
:root {
  --bg: #090c10;
  --card: #151b23;
  --card-header: #212830;
  --accent: #2f81f7;
  --accent-light: #58a6ff;
  --accent-bg: rgba(47, 129, 247, 0.15);
  --ok: #2ea043;
  --ok-bg: rgba(46, 160, 67, 0.15);
  --ng: #f85149;
  --ng-bg: rgba(248, 81, 73, 0.15);
  --txt: #c9d1d9;
  --txt-bold: #f0f6fc;
  --sub: #8b949e;
  --border: #30363d;
}
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
body {
  margin: 0;
  background-color: var(--bg);
  color: var(--txt);
  padding-bottom: 75px;
  font-size: 14px;
  line-height: 1.6;
}
header {
  position: sticky;
  top: 0;
  background-color: rgba(21, 27, 35, 0.95);
  backdrop-filter: blur(8px);
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
h1 {
  font-size: 14px;
  margin: 0;
  font-weight: 700;
  color: var(--txt-bold);
}
.stats-badge {
  background: var(--card-header);
  padding: 4px 8px;
  border-radius: 12px;
  font-size: 11px;
  border: 1px solid var(--border);
}
.stats-badge b { color: var(--accent-light); }

.wrap {
  padding: 12px;
  max-width: 600px;
  margin: 0 auto;
}
.page { display: none; }
.page.active { display: block; }

/* カードデザイン */
.card {
  background: var(--card);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
}
.card-title {
  font-size: 15px;
  font-weight: bold;
  color: var(--txt-bold);
  margin-top: 0;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ダッシュボード */
.db-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
.db-stat {
  background: var(--card-header);
  border-radius: 8px;
  padding: 12px;
  text-align: center;
  border: 1px solid var(--border);
}
.db-stat .val {
  font-size: 24px;
  font-weight: bold;
  color: var(--accent-light);
  margin-top: 4px;
}
.db-stat .val.ok { color: var(--ok); }
.db-stat .val.ng { color: var(--ng); }

/* ドーナツグラフ */
.chart-box {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 10px 0;
}
.donut {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: conic-gradient(var(--ok) 0%, var(--border) 0%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.donut::before {
  content: "";
  position: absolute;
  width: 60px;
  height: 60px;
  background: var(--card);
  border-radius: 50%;
}
.donut-text {
  position: absolute;
  font-size: 14px;
  font-weight: bold;
  color: var(--txt-bold);
}

/* 問題表示UI */
.q-header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.q-cat {
  font-size: 11px;
  background-color: var(--accent-bg);
  color: var(--accent-light);
  font-weight: bold;
  padding: 4px 8px;
  border-radius: 4px;
  border: 1px solid rgba(47, 129, 247, 0.3);
}
.mode-tag {
  font-size: 11px;
  background: #212830;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid var(--border);
  cursor: pointer;
}
.q-text {
  font-size: 14px;
  line-height: 2.1;
  margin-bottom: 12px;
  white-space: pre-wrap;
  color: var(--txt-bold);
  background: #0d1117;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
}

/* 空欄のタップエリア */
.blank {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 44px;
  height: 26px;
  margin: 0 3px;
  border-bottom: 2px solid var(--accent-light);
  color: var(--accent-light);
  font-weight: bold;
  padding: 0 6px;
  cursor: pointer;
  background: var(--accent-bg);
  border-radius: 4px 4px 0 0;
  transition: all 0.1s ease;
  vertical-align: middle;
}
.blank.cur {
  background: rgba(88, 166, 255, 0.3);
  border-bottom: 2px solid #fff;
  box-shadow: 0 0 6px rgba(88, 166, 255, 0.4);
}
.blank.filled {
  color: #fff;
  background: #212830;
  border-bottom-color: var(--sub);
}
.blank.ok {
  color: #fff;
  background-color: var(--ok-bg);
  border-bottom-color: var(--ok);
}
.blank.ng {
  color: #fff;
  background-color: var(--ng-bg);
  border-bottom-color: var(--ng);
}

/* ボトムシート（20択モーダル） */
.sheet-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: all 0.25s ease;
}
.sheet-overlay.show {
  opacity: 1;
  visibility: visible;
}
.bottom-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-radius: 16px 16px 0 0;
  max-height: 70vh;
  min-height: 50vh;
  z-index: 1001;
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  flex-direction: column;
  border-top: 1px solid var(--border);
}
.bottom-sheet.show {
  transform: translateY(0);
}
.sheet-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--card-header);
  border-radius: 16px 16px 0 0;
}
.sheet-title {
  font-weight: bold;
  color: var(--accent-light);
  font-size: 13.5px;
}
.sheet-close {
  background: none;
  border: none;
  color: var(--sub);
  font-size: 20px;
  cursor: pointer;
  padding: 0 4px;
}
.sheet-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}
.choices {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.choice {
  background: #1c2128;
  color: var(--txt);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 13.5px;
  line-height: 1.4;
  cursor: pointer;
  text-align: left;
  transition: all 0.1s;
}
.choice:active {
  background: var(--border);
}
.choice.sel {
  border-color: var(--accent-light);
  background: var(--accent-bg);
  color: var(--txt-bold);
}

/* ボタン */
.btn {
  display: block;
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 14px;
  font-size: 14px;
  font-weight: bold;
  margin-top: 12px;
  cursor: pointer;
  text-align: center;
}
.btn:active { background: #246dd6; }
.btn.sub {
  background: #212830;
  color: var(--txt);
  border: 1px solid var(--border);
}
.btn.sub:active { background: #30363d; }
.row2 {
  display: flex;
  gap: 8px;
}
.btn.half { flex: 1; margin-top: 12px; }

/* 採点結果・解説 */
.exp {
  display: none;
  background: #0d1117;
  border-left: 4px solid var(--accent);
  padding: 12px;
  border-radius: 8px;
  margin-top: 12px;
  font-size: 13px;
  line-height: 1.7;
  border: 1px solid var(--border);
  border-left-width: 4px;
}
.exp.show { display: block; }
.exp .item {
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.exp .item:last-child {
  margin-bottom: 0;
  padding-bottom: 0;
  border-bottom: none;
}
.exp b { color: var(--accent-light); }
.exp .x { color: var(--ng); font-weight: bold; margin-right: 4px; }
.exp .o { color: var(--ok); font-weight: bold; margin-right: 4px; }

/* 弱点カードリスト（ダッシュボード・履歴共通） */
.wrongList {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.wrongItem {
  font-size: 13px;
  padding: 12px;
  background: #1c2128;
  border-radius: 8px;
  border: 1px solid var(--border);
  border-left: 4px solid var(--ng);
}
.wrongItem .h {
  color: #ff7b72;
  font-weight: bold;
  margin-bottom: 4px;
  display: flex;
  justify-content: space-between;
}
.wrongItem .exp-txt {
  margin-top: 6px;
  font-size: 12px;
  color: var(--sub);
  background: #0d1117;
  padding: 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.btn-jump {
  display: inline-block;
  background: var(--accent-bg);
  color: var(--accent-light);
  border: 1px solid rgba(47, 129, 247, 0.3);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  margin-top: 8px;
  text-decoration: none;
}
.btn-jump:active {
  background: rgba(47, 129, 247, 0.3);
}

/* 下部ナビゲーション */
.nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--card);
  display: flex;
  border-top: 1px solid var(--border);
  z-index: 999;
}
.nav button {
  flex: 1;
  background: none;
  border: none;
  color: var(--sub);
  padding: 8px 0;
  font-size: 10px;
  cursor: pointer;
}
.nav button.active {
  color: var(--accent-light);
}
.nav button div {
  font-size: 16px;
  margin-bottom: 2px;
}
textarea {
  width: 100%; height: 100px;
  background: #0d1117; color: var(--txt);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 10px;
  font-size: 11px; margin-bottom: 8px;
}
.hint {
  font-size: 11px; color: var(--sub);
  text-align: center; margin-top: 6px;
}
</style>
</head>
<body>

<header>
  <h1>📚 社労士 第57回 選択式合格ナビ</h1>
  <div class="stats-badge">正解数 <b id="okBlanks">0</b></div>
</header>

<div class="wrap">
  
  <!-- 1. ホーム（ダッシュボード）ページ -->
  <div class="page active" id="p-home">
    <div class="card">
      <h2 class="card-title">📊 あなたの現在の学習状況</h2>
      <div class="chart-box">
        <div class="donut" id="scoreDonut">
          <span class="donut-text" id="scorePercent">0%</span>
        </div>
        <div style="flex:1;">
          <div style="font-size: 13px; color: var(--sub);">解答した空欄数: <span id="dbTotalBlanks" style="color: #fff; font-weight: bold;">0</span></div>
          <div style="font-size: 13px; color: var(--sub);">正解した空欄数: <span id="dbCorrectBlanks" style="color: var(--ok); font-weight: bold;">0</span></div>
        </div>
      </div>
      <button class="btn" onclick="startStudyBtn()">✏️ 学習を始める</button>
    </div>

    <div class="card">
      <h2 class="card-title" style="justify-content: space-between;">
        <span>🔥 弱点克服（あなたの誤答と解説）</span>
        <span style="font-size:11px; font-weight:normal; color:var(--sub);" id="dbWrongCount">0件</span>
      </h2>
      <p style="font-size:11px; color:var(--sub); margin-top:0;">間違えた空欄が、各空欄の詳しい解説とともに新しい順に並びます。何度も読んで暗記しましょう！</p>
      <div id="dbWrongList" class="wrongList"></div>
    </div>
  </div>

  <!-- 2. クイズ学習ページ -->
  <div class="page" id="p-study">
    <div class="card" id="quizCard"></div>
  </div>

  <!-- 3. データ管理・追加ページ -->
  <div class="page" id="p-add">
    <div class="card">
      <h3 style="margin-top:0; color:#fff;">⚙️ アプリの設定と管理</h3>
      <p style="font-size:11px; color:var(--sub);">問題がバグったり初期化したい場合は、下のボタンを押してください。追加データは消去されます。</p>
      <div class="row2">
        <button class="btn sub half" onclick="resetSeed()">選択式8問を初期化</button>
        <button class="btn sub half" onclick="clearWrongRecord()">誤答記録を全消去</button>
      </div>
    </div>
    <div class="card">
      <h3 style="margin-top:0; color:#fff;">➕ 問題の追加</h3>
      <textarea id="box" placeholder='[{"cat":"カスタム問題","text":"【A】は基準です。","choices":["選択1","選択2"],"answer":[0],"exp":["Aの解説です"]}]'></textarea>
      <button class="btn" onclick="importJSON()">追加を実行する</button>
      <p class="hint">現在の収録問題数: <b id="cnt" style="color:var(--accent-light)">8</b> 問</p>
    </div>
  </div>

</div>

<!-- 下部ボトムシート（20択選択肢モーダル） -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-header">
    <span class="sheet-title" id="sheetTitle">空欄を選択</span>
    <button class="sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sheet-body">
    <div class="choices" id="sheetChoices"></div>
  </div>
</div>

<!-- 下部ナビゲーションバー -->
<div class="nav">
  <button class="active" onclick="tab('home',this)" id="tabBtnHome"><div>🏠</div>ホーム</button>
  <button onclick="tab('study',this)" id="tabBtnStudy"><div>✏️</div>学習</button>
  <button onclick="tab('add',this)"><div>⚙️</div>設定</button>
</div>

<script>
/* ===== 第57回 選択式全8問 完全版データ ===== */
var SEED = [
  {
    cat: "労基・安衛 〔問 1〕",
    text: "₁ 労働基準法第₁₁₄ 条は、 【A】 は、同法第₃₇ 条の規定に違反した使用者に対して、労働者の請求により、同条の規定により使用者が支払わなければならない金額についての未払金のほか、これと同一額の 【B】 の支払を命ずることができる旨規定している。\n\n₂ 「労働基準法₆₅ 条は、産前産後休業を定めているが、産前産後休業中の賃金については何らの定めを置いていないから、産前産後休業が有給であることまでも保障したものではないと解するのが相当である。〔…〕趣旨に照らすと、これにより上記権利等の行使を抑制し、ひいては労働基準法等が 【C】 場合に限り、公序に反するものとして無効となると解するのが相当である」。\n\n₃ 総括安全衛生管理者、産業医、衛生管理者等の選任及び職務の励行、衛生委員会の設置等の労働衛生管理体制の確立を基本とした上で、作業環境管理、 【D】 及び健康管理並びに労働衛生教育の総合的な実施を図っていく必要がある。\n\n₄ 労働安全衛生法第₄₂ 条は、「特定機械等以外の機械等で、別表第₂ に掲げるものその他危険若しくは有害な作業を必要とするもの等は、厚生労働大臣が定める規格又は安全装置を具備しなければ、 【E】 、又は設置してはならない。」と定めている。",
    choices: ["① 慰謝料", "② 厚生労働大臣", "③ 裁判所", "④ 作業管理", "⑤ 使用者に労働者の仕事と生活の調和にも配慮することを規定している趣旨を実質的に失わせるものと認められる", "⑥ 上記権利等を保障した趣旨を実質的に失わせるものと認められる", "⑦ 譲渡し、貸与し", "⑧ 譲渡し、展示し", "⑨ 生産管理", "⑩ 遅延損害金", "⑪ 同法等に違反する行為に罰則を設けている意味を没却させる", "⑫ 都道府県労働局長", "⑬ 賠償金", "⑭ 販売し、賃貸し", "⑮ 販売し、販売のために展示し", "⑯ 付加金", "⑰ 有害物管理", "⑱ 労働基準監督署長", "⑲ 労働時間管理", "⑳ 労働条件は労働者と使用者が対等の立場において決定すべきものとしている意味を没却させる"],
    answer: [2, 15, 5, 3, 6],
    exp: [
      "【A】= ③ 裁判所。付加金の支払いを命じるのは『裁判所』です。",
      "【B】= ⑯ 付加金。割増賃金や有休などの未払に対し、同一額の支払いを命じる『付加金』です。",
      "【C】= ⑥ 上記権利等を保障した趣旨を実質的に失わせるものと認められる。（東朋学園事件判例）",
      "【D】= ④ 作業管理。労働衛生の3管理（作業環境管理、作業管理、健康管理）の1つです。",
      "【E】= ⑦ 譲渡し、貸与し。安衛法42条『譲渡し、貸与し、又は設置してはならない』規定です。"
    ]
  },
  {
    cat: "労災保険法 〔問 2〕",
    text: "₁ 遺族補償年金を受けることができる、障害の状態にある遺族の障害の状態について、「障害の状態は、身体に別表第₁ の障害等級の 【A】 に該当する障害がある状態又は負傷若しくは疾病が治らないで、身体の機能若しくは精神に、 【B】 が高度の制限を受けるか、若しくは 【B】 に高度の制限を加えることを必要とする程度以上の障害がある状態とする。」と定めている。\n\n₂ 「長期家族介護者援護金は、別表第₁ の障害等級第₁ 級若しくは第₂ 級の障害補償年金等の支給を受けていた期間が 【C】 以上である者の遺族のうち…に支給するものとする。」\n\n₃ 最高裁は、労災就学援護費について次のように判示した。\n「労災就学援護費に関する制度は、政府が、保険給付を 【D】 するために、労働福祉事業として、保険給付と同様の手続により支給することができる。具体的に支給を受けるためには、 【E】 に申請し、支給決定によって初めて具体的な支給請求権を取得するものといわなければならない。」",
    choices: ["① ₃ 年", "② ₅ 年", "③ ₇ 年", "④ ₁₀ 年", "⑤ 確保", "⑥ 厚生労働大臣", "⑦ 第₁ 級", "⑧ 第₅ 級以上", "⑨ 第₈ 級以上", "⑩ 第₁₂ 級以上", "⑪ 代替", "⑫ 都道府県労働局長", "⑬ 日常生活", "⑭ 日常生活又は社会生活", "⑮ 付加", "⑯ 補完", "⑰ 労働", "⑱ 労働基準監督署長", "⑲ 労働者災害補償保険審査官", "⑳ 労働又は社会生活"],
    answer: [7, 16, 3, 15, 17],
    exp: [
      "【A】= ⑧ 第₅ 級以上。遺族補償年金の対象となる障害の状態は『第5級以上』です。",
      "【B】= ⑰ 労働。同規定における文言は『労働』が高度の制限を受ける状態を指します。",
      "【C】= ④ ₁₀ 年。長期家族介護者援護金の対象期間は『10年』以上です。",
      "【D】= ⑯ 補完。労災就学援護費の制度は、労災保険の給付を『補完』する位置づけです。",
      "【E】= ⑱ 労働基準監督署長。支給の決定権者は『労働基準監督署長』です。"
    ]

/* ===== 起動時データ整合チェック ===== */
function blankCountOf(t){return (t.match(/【[A-E]】/g)||[]).length;}
function blankLabelsOf(t){return (t.match(/【([A-E])】/g)||[]).map(function(x){return x.charAt(1);});}

/* ===== ストレージ制御 ===== */
function load(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}

var QS = load('s57_qs_v4', null);
if (!QS || QS.length === 0) {
  QS = JSON.parse(JSON.stringify(SEED));
  save('s57_qs_v4', QS);
}

// 統計情報を保持する構造
var ST = load('s57_st_v4', {
  idx: 0,
  okBlanks: 0, 
  wrong: [],
  isRandom: false,
  totalAnswered: 0 // 通算解答数
});

var cur = ST.idx || 0;
if (cur >= QS.length) { cur = 0; ST.idx = 0; }

// 出題用インデックス配列の生成
var playOrder = [];
function rebuildPlayOrder() {
  playOrder = Array.from({length: QS.length}, (v, i) => i);
  if (ST.isRandom) {
    // フィッシャー・イェーツのシャッフル
    for (let i = playOrder.length - 1; i > 0; i--) {
      let r = Math.floor(Math.random() * (i + 1));
      let tmp = playOrder[i];
      playOrder[i] = playOrder[r];
      playOrder[r] = tmp;
    }
  }
}
rebuildPlayOrder();

var picks = {};      // 現在解いている問題の回答 {0: choicesIdx, 1: choicesIdx...}
var checked = false; // 採点済みフラグ
var activeBlank = 0; // 現在選択中の空欄連番 (0〜)

/* ===== 1. ホーム（ダッシュボード）の描画 ===== */
function renderDashboard() {
  var total = ST.totalAnswered || 0;
  var ok = ST.okBlanks || 0;
  var percent = total > 0 ? Math.round((ok / total) * 100) : 0;
  
  document.getElementById('dbTotalBlanks').textContent = total;
  document.getElementById('dbCorrectBlanks').textContent = ok;
  document.getElementById('scorePercent').textContent = percent + "%";
  
  // ドーナツグラフのCSSグラデーション更新
  document.getElementById('scoreDonut').style.background = 
    `conic-gradient(var(--ok) ${percent}%, var(--border) ${percent}%)`;
    
  // 誤答カードリスト
  var wBox = document.getElementById('dbWrongList');
  document.getElementById('dbWrongCount').textContent = ST.wrong.length + "件";
  
  if (ST.wrong.length === 0) {
    wBox.innerHTML = '<div style="text-align:center; padding:20px 0; color:var(--sub); font-size:12px;">現在、誤答データはありません。</div>';
    return;
  }
  
  wBox.innerHTML = ST.wrong.slice().reverse().map(function(w) {
    // 問題への復習ジャンプ用のインデックス特定
    var qIdx = w.qIdx;
    if (qIdx === undefined) {
      qIdx = QS.findIndex(q => q.cat === w.cat);
    }
    
    var jumpBtnHtml = (qIdx !== -1) ? `<button class="btn-jump" onclick="jumpToReview(${qIdx})">👉 この問題をすぐ復習する</button>` : '';
    
    return `<div class="wrongItem">
      <div class="h">
        <span>${w.cat} (空欄【${w.blank}】)</span>
        <span style="font-size:10px; font-weight:normal; color:var(--sub);">${w.date}</span>
      </div>
      <div>あなたの解答: <span style="color:var(--ng); text-decoration:line-through;">${w.your}</span></div>
      <div>正しい解答: <span style="color:var(--ok); font-weight:bold;">${w.correct}</span></div>
      <div class="exp-txt"><b>【解説】</b> ${w.exp}</div>
      ${jumpBtnHtml}
    </div>`;
  }).join('');
}

// 誤答カードの「復習する」を押した時
function jumpToReview(qIdx) {
  // シャッフル設定を一時OFF
  ST.isRandom = false;
  save('s57_st_v4', ST);
  rebuildPlayOrder();
  
  // 対象の問題番号へ移動
  cur = playOrder.indexOf(qIdx);
  if (cur === -1) { cur = 0; }
  ST.idx = cur;
  save('s57_st_v4', ST);
  
  // 初期化
  picks = {};
  checked = false;
  activeBlank = 0;
  
  // 画面遷移
  tab('study');
}

function startStudyBtn() {
  tab('study');
}

/* ===== 2. クイズ学習ページの描画 ===== */
function drawQ() {
  var realIdx = playOrder[cur];
  var q = QS[realIdx];
  var totalBlanks = blankCountOf(q.text);
  
  var html = `
    <div class="q-header-row">
      <div class="q-cat">${q.cat}</div>
      <div class="mode-tag" onclick="toggleRandom()">出題順: <b>${ST.isRandom ? "ランダム 🔀" : "通常 ⬇️"}</b></div>
    </div>
    <div class="q-text">${buildText(q.text)}</div>
    <div class="hint">💡 青い空欄をタップすると、20個の選択肢が表示されます。</div>
  `;
  
  if (!checked) {
    html += '<button class="btn" onclick="checkAns()">すべての空欄を採点する</button>';
  }
  
  html += '<div class="exp" id="exp"></div>';
  
  html += `
    <div class="row2">
      <button class="btn sub half" onclick="goQ(-1)">◀ 前の問題</button>
      <button class="btn sub half" onclick="goQ(1)">次の問題 ▶</button>
    </div>
  `;
  
  document.getElementById('quizCard').innerHTML = html;
  
  if (checked) {
    showResult();
  }
}

// 空欄のspan要素を生成
function buildText(text) {
  var labels = blankLabelsOf(text);
  var i = -1;
  return text.replace(/【([A-E])】/g, function(match, labelChar) {
    i++;
    var bi = i;
    var content = "";
    if (picks[bi] != null) {
      var realIdx = playOrder[cur];
      content = "[" + labelChar + "] " + QS[realIdx].choices[picks[bi]];
    } else {
      content = "【" + labelChar + "】";
    }
    
    var cls = "blank";
    if (picks[bi] != null) cls += " filled";
    if (bi === activeBlank && !checked) cls += " cur";
    
    return `<span class="${cls}" id="bk${bi}" onclick="openChoicesSheet(${bi})">${content}</span>`;
  });
}

// ボトムシートを開いて選択肢を表示
function openChoicesSheet(bi) {
  if (checked) return;
  activeBlank = bi;
  
  var realIdx = playOrder[cur];
  var q = QS[realIdx];
  var labels = blankLabelsOf(q.text);
  var curLabel = labels[activeBlank] || "?";
  
  document.getElementById('sheetTitle').textContent = `空欄【${curLabel}】に入る語句を選択`;
  
  var html = "";
  q.choices.forEach(function(choiceText, idx) {
    var isSel = (picks[activeBlank] === idx) ? " sel" : "";
    html += `<button class="choice${isSel}" onclick="pickChoice(${idx})">${choiceText}</button>`;
  });
  
  document.getElementById('sheetChoices').innerHTML = html;
  
  // シートを表示
  document.getElementById('sheetOverlay').classList.add('show');
  document.getElementById('bottomSheet').classList.add('show');
  
  // 今のアクティブ空欄表示を更新
  drawQ();
}

function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('show');
  document.getElementById('bottomSheet').classList.remove('show');
}

// ボトムシート内で選択肢をタップした時
function pickChoice(idx) {
  picks[activeBlank] = idx;
  var realIdx = playOrder[cur];
  var totalBlanks = blankCountOf(QS[realIdx].text);
  
  // まだ埋まっていない別の空欄があるか探す
  var nextBlank = -1;
  for (var b = 0; b < totalBlanks; b++) {
    if (picks[b] == null) {
      nextBlank = b;
      break;
    }
  }
  
  if (nextBlank !== -1) {
    // 自動で次の空欄にシートを切り替える
    activeBlank = nextBlank;
    openChoicesSheet(activeBlank);
  } else {
    // 全部埋まったらシートを閉じる
    closeSheet();
    drawQ();
  }
}

// 採点
function checkAns() {
  var realIdx = playOrder[cur];
  var q = QS[realIdx];
  var n = blankCountOf(q.text);
  var labels = blankLabelsOf(q.text);
  
  for (var b = 0; b < n; b++) {
    if (picks[b] == null) {
      alert(`未解答の空欄があります。空欄【${labels[b]}】を選択してください。`);
      openChoicesSheet(b);
      return;
    }
  }
  
  checked = true;
  var today = new Date().toLocaleDateString('ja-JP');
  
  for (var b = 0; b < n; b++) {
    var isOk = (picks[b] === q.answer[b]);
    ST.totalAnswered++; // 通算回答数を増やす
    if (isOk) {
      ST.okBlanks++;
    } else {
      ST.wrong.push({
        date: today,
        cat: q.cat,
        qIdx: realIdx, // ジャンプ復習用のインデックス
        blank: labels[b],
        your: q.choices[picks[b]],
        correct: q.choices[q.answer[b]],
        exp: q.exp[b] || "解説はありません。"
      });
    }
  }
  save('s57_st_v4', ST);
  drawQ();
}

function showResult() {
  var realIdx = playOrder[cur];
  var q = QS[realIdx];
  var n = blankCountOf(q.text);
  var labels = blankLabelsOf(q.text);
  
  for (var b = 0; b < n; b++) {
    var el = document.getElementById('bk' + b);
    if (el) {
      el.classList.remove('cur', 'filled');
      el.classList.add(picks[b] === q.answer[b] ? 'ok' : 'ng');
    }
  }
  
  var h = `<h3 style="margin-top:0; color:#fff; border-bottom:1px solid var(--border); padding-bottom:6px;">💡 採点結果と解説</h3>`;
  for (var b = 0; b < n; b++) {
    var isCorrect = (picks[b] === q.answer[b]);
    h += `<div class="item">`;
    h += `<b>【${labels[b]}】</b> ${isCorrect ? '<span class="o">◯ 正解</span>' : '<span class="x">× 不正解</span>'}<br>`;
    h += `あなたの回答: <span style="color:#fca5a5">${q.choices[picks[b]]}</span><br>`;
    if (!isCorrect) {
      h += `正しい解答: <span class="o">${q.choices[q.answer[b]]}</span><br>`;
    }
    h += `<span style="color:var(--sub); font-size:12.5px;">解説: ${q.exp[b]}</span>`;
    h += `</div>`;
  }
  
  var expDiv = document.getElementById('exp');
  expDiv.innerHTML = h;
  expDiv.classList.add('show');
}

function goQ(d) {
  cur += d;
  if (cur < 0) {
    alert("これが最初の問題です。");
    cur = 0;
    return;
  }
  if (cur >= QS.length) {
    alert("すべての問題を終了しました！最初の問題に戻ります。");
    cur = 0;
  }
  
  ST.idx = cur;
  save('s57_st_v4', ST);
  
  picks = {};
  checked = false;
  activeBlank = 0;
  drawQ();
}

function toggleRandom() {
  ST.isRandom = !ST.isRandom;
  save('s57_st_v4', ST);
  rebuildPlayOrder();
  cur = 0;
  ST.idx = 0;
  picks = {};
  checked = false;
  activeBlank = 0;
  drawQ();
}

/* ===== タブ切り替え ===== */
function tab(name, btn) {
  var ps = document.querySelectorAll('.page');
  for (var i = 0; i < ps.length; i++) ps[i].classList.remove('active');
  document.getElementById('p-' + name).classList.add('active');
  
  var bs = document.querySelectorAll('.nav button');
  for (var j = 0; j < bs.length; j++) bs[j].classList.remove('active');
  
  if (btn) {
    btn.classList.add('active');
  } else {
    // 内部コードからの遷移用
    if (name === 'home') document.getElementById('tabBtnHome').classList.add('active');
    if (name === 'study') document.getElementById('tabBtnStudy').classList.add('active');
  }
  
  if (name === 'home') renderDashboard();
  if (name === 'study') drawQ();
  if (name === 'add') {
    document.getElementById('cnt').textContent = QS.length;
  }
}

/* ===== 設定/追加ページ処理 ===== */
function importJSON() {
  var t = document.getElementById('box').value.trim();
  if (!t) return;
  try {
    var arr = JSON.parse(t);
    if (!Array.isArray(arr)) arr = [arr];
    
    var errs = [];
    arr.forEach(function(q, i) {
      if (!q.cat || !q.text || !q.choices || !q.answer || !q.exp) {
        errs.push("必須データ項目が不足しているレコードがあります。");
        return;
      }
      var blNum = blankCountOf(q.text);
      if (q.answer.length !== blNum || q.exp.length !== blNum) {
        errs.push(`${q.cat} の空欄数(${blNum})と正答/解説の数が不一致です。`);
      }
    });
    
    if (errs.length > 0) {
      alert("エラーのため取り込めません:\n" + errs.join("\n"));
      return;
    }
    
    arr.forEach(q => QS.push(q));
    save('s57_qs_v4', QS);
    rebuildPlayOrder();
    document.getElementById('box').value = "";
    alert(`${arr.length}問 追加しました！`);
    tab('home');
  } catch(e) {
    alert("JSONの読み込みに失敗しました: " + e.message);
  }
}

function resetSeed() {
  if (confirm('追加したカスタム問題を削除し、第57回選択式（全8問）に初期化しますか？')) {
    QS = JSON.parse(JSON.stringify(SEED));
    save('s57_qs_v4', QS);
    ST.idx = 0;
    save('s57_st_v4', ST);
    cur = 0;
    picks = {};
    checked = false;
    activeBlank = 0;
    rebuildPlayOrder();
    alert('初期化完了しました。');
    tab('home');
  }
}

function clearWrongRecord() {
  if (confirm('すべての誤答記録と学習スコアをリセットしますか？')) {
    ST.okBlanks = 0;
    ST.totalAnswered = 0;
    ST.wrong = [];
    save('s57_st_v4', ST);
    alert('クリアしました。');
    tab('home');
  }
}

/* ===== 起動時処理 ===== */
(function() {
  renderDashboard();
  drawQ();
})();
</script>
